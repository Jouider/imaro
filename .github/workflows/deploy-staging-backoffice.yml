name: Deploy Back-office (Staging)

on:
  push:
    branches:
      - develop
    paths:
      - 'backoffice/**'
  workflow_dispatch:

# Sérialise les déploiements (mêmes raisons que le front : évite les sessions
# SSH qui se chevauchent).
concurrency:
  group: deploy-staging-backoffice
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd /var/www/imaro-staging

            echo "🧹 Clean stale locks..."
            sudo rm -f .git/index.lock
            if [ -e .git/index.lock ]; then
              echo "::error::Impossible de supprimer .git/index.lock — déploiement interrompu."
              exit 1
            fi

            echo "📦 Pull latest code..."
            git fetch origin develop
            git reset --hard origin/develop
            git clean -fd

            echo "📚 Install dependencies..."
            cd backoffice
            rm -rf node_modules
            npm ci

            # NB : le back-office construit sa baseURL en `VITE_API_URL + /api`
            # (cf. backoffice/src/lib/api.ts) — donc PAS de suffixe /api ici,
            # contrairement au front principal.
            echo "🔨 Build..."
            VITE_API_URL=https://api-staging.imaro.ma npm run build

            echo "✅ Staging back-office deployed!"
