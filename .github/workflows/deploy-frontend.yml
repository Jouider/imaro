name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
  workflow_dispatch:

# Sérialise les déploiements : un merge rapproché attend la fin du déploiement en
# cours (évite les sessions SSH qui se chevauchent et les timeouts).
concurrency:
  group: deploy-prod-frontend
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd /var/www/imaro

            echo "🧹 Clean stale locks..."
            rm -f .git/index.lock

            echo "📦 Pull latest code..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            echo "📚 Install dependencies..."
            cd frontend
            rm -rf node_modules
            npm ci

            echo "🔨 Build..."
            VITE_API_URL=${{ secrets.VITE_API_URL }} npm run build

            echo "✅ Frontend deployed successfully!"
