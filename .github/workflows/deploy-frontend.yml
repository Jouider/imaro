name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
  workflow_dispatch:

# Sérialise les déploiements : un merge rapproché attend la fin du déploiement en
# cours (évite les sessions SSH qui se chevauchent et les timeouts).
concurrency:
  group: deploy-prod-frontend
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd /var/www/imaro

            # `rm -f` échoue en silence si le lock appartient à un autre
            # utilisateur : c'est ce qui a fait échouer le déploiement du 21/07.
            echo "🧹 Clean stale locks..."
            sudo rm -f .git/index.lock
            if [ -e .git/index.lock ]; then
              echo "::error::Impossible de supprimer .git/index.lock — déploiement interrompu."
              exit 1
            fi

            echo "📦 Pull latest code..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            echo "📚 Install dependencies..."
            cd frontend
            rm -rf node_modules
            npm ci

            # NB : le front principal attend une URL COMPLÈTE, suffixe /api inclus
            # (cf. frontend/.env.example) — contrairement au back-office qui, lui,
            # concatène `VITE_API_URL + /api`. Valeur en dur plutôt qu'en secret :
            # un secret mal renseigné est invisible en relecture, et c'est
            # exactement ce qui a cassé la connexion en prod (appels vers
            # api.imaro.ma/auth/login → 404 sans en-tête CORS).
            echo "🔨 Build..."
            VITE_API_URL=https://api.imaro.ma/api npm run build

            # Vérification post-build : l'URL d'API doit être présente ET complète
            # dans le bundle produit. Une URL sans /api renvoie 404 sans en-tête
            # CORS, ce que le navigateur signale comme une erreur d'origine — un
            # symptôme trompeur qui a coûté du temps le 22/07/2026.
            echo "🔍 Vérification de l'URL d'API compilée..."
            if ! grep -rq "https://api.imaro.ma/api" dist/assets/*.js; then
              echo "::error::L'URL d'API attendue est absente du bundle — build à ne pas publier."
              exit 1
            fi
            if grep -rqE '"https://api\.imaro\.ma"' dist/assets/*.js; then
              echo "::error::Le bundle contient l'URL sans suffixe /api — la connexion serait cassée."
              exit 1
            fi

            echo "✅ Frontend deployed successfully! (URL d'API vérifiée)"
